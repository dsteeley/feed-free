version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      # Pinned to ESLint v8 + typescript-eslint v7 for legacy .eslintrc.json compatibility
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@typescript-eslint/eslint-plugin'
        update-types: ['version-update:semver-major']
      - dependency-name: '@typescript-eslint/parser'
        update-types: ['version-update:semver-major']
