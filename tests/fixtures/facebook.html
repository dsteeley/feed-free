<!doctype html>
<html lang="en" data-fbfocus-page="home">
  <head>
    <meta charset="UTF-8" />
    <title>Facebook</title>
  </head>
  <body>
    <!-- Stories bar -->
    <div data-pagelet="Stories" id="stories">
      <div>Story 1</div>
      <div>Story 2</div>
    </div>

    <!-- Main feed area -->
    <div role="main" id="main">
      <!-- Feed unit 0 -->
      <div data-pagelet="FeedUnit_0" id="feed-unit-0">
        <div role="article" id="post-1">
          <p>Post 1 content</p>
        </div>
      </div>
      <!-- Feed unit 1 -->
      <div data-pagelet="FeedUnit_1" id="feed-unit-1">
        <div role="article" id="post-2">
          <p>Post 2 content</p>
        </div>
      </div>
      <!-- Reel article -->
      <div role="article" id="reel-post" data-fbfocus-reel="true">
        <a href="/watch/123">Watch video</a>
      </div>
    </div>

    <!-- Right sidebar -->
    <div data-pagelet="RightRail" id="right-rail">
      <div>Sponsored</div>
      <div>People You May Know</div>
    </div>
  </body>
</html>
