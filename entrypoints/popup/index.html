<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Feed Free</title>
  </head>
  <body>
    <div class="container">
      <h1>Feed Free</h1>
      <p class="subtitle">Take back your attention</p>

      <section class="section">
        <h2 class="section-title">Platforms</h2>
        <div class="toggles">
          <label class="toggle-row">
            <span class="toggle-label">Facebook</span>
            <input type="checkbox" id="toggle-platform-facebook" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">YouTube</span>
            <input type="checkbox" id="toggle-platform-youtube" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Instagram</span>
            <input type="checkbox" id="toggle-platform-instagram" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Twitter / X</span>
            <input type="checkbox" id="toggle-platform-twitter" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">TikTok</span>
            <input type="checkbox" id="toggle-platform-tiktok" />
            <span class="toggle-switch"></span>
          </label>
        </div>
      </section>

      <section class="section" id="fb-options">
        <h2 class="section-title">Facebook Options</h2>
        <div class="toggles">
          <label class="toggle-row">
            <span class="toggle-label">Block News Feed</span>
            <input type="checkbox" id="toggle-feed" />
            <span class="toggle-switch"></span>
          </label>
          <label class="toggle-row">
            <span class="toggle-label">Block Reels</span>
            <input type="checkbox" id="toggle-reels" />
            <span class="toggle-switch"></span>
          </label>
        </div>
      </section>

      <section class="section">
        <div class="toggles">
          <label class="toggle-row">
            <span class="toggle-label">Developer Mode</span>
            <input type="checkbox" id="toggle-devmode" />
            <span class="toggle-switch"></span>
          </label>
        </div>
      </section>

      <p class="footer">Groups, Messenger, and Marketplace are always available.</p>
    </div>
    <script src="./main.ts" type="module"></script>
  </body>
</html>
